name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - name: next build (placeholder env)
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_TENANT_ID: 00000000-0000-0000-0000-000000000001
        run: npm run build

  m1a:
    name: M1a — concorrenza reale (gated)
    runs-on: ubuntu-latest
    # Esegue solo se le chiavi del progetto Supabase sono nei Secrets.
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run M1a serialized append test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # Lo step viene saltato (skip interno via describe.skip) se i secrets
        # mancano, così il workflow non fallisce prima del setup dell'ambiente.
        run: npm run test:m1a
